<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="PWA de custos do cardápio com BOM, fichas técnicas, embalagens e rateio de custos fixos." />
  <title>CMV / BOM — Cardápio Gyros</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>

    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:var(--sans);color:var(--text);background:radial-gradient(circle at top left, rgba(251,191,36,.12), transparent 26%),radial-gradient(circle at bottom right, rgba(56,189,248,.10), transparent 22%),var(--bg)}body.nav-open{overflow:hidden}button,input,select,textarea{font:inherit}a{color:inherit}button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid rgba(251,191,36,.9);outline-offset:2px}button,input,select,textarea{transition:border-color .18s ease,background .18s ease,box-shadow .18s ease}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:18px;border-right:1px solid var(--line);background:linear-gradient(180deg,rgba(17,27,47,.96),rgba(10,16,30,.96));backdrop-filter:blur(10px);z-index:30}.sidebar-backdrop{position:fixed;inset:0;background:rgba(3,8,20,.62);display:none;z-index:20}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg, rgba(251,191,36,.22), rgba(56,189,248,.18));border:1px solid rgba(251,191,36,.24);display:grid;place-items:center;font-weight:900;letter-spacing:.06em}.brand h1{font-size:16px;line-height:1.2;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}.nav{display:grid;gap:8px;margin-top:12px}.nav button{border:1px solid var(--line);background:rgba(17,27,47,.65);color:var(--text);padding:12px 14px;border-radius:14px;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px}.nav button.active{border-color:rgba(251,191,36,.55);background:linear-gradient(90deg,rgba(251,191,36,.16),rgba(255,255,255,.04))}.side-stats{margin-top:18px;display:grid;gap:10px}.mini-card{border:1px solid var(--line);background:rgba(11,18,32,.4);border-radius:16px;padding:12px}.mini-card .label{font-size:12px;color:var(--muted)}.mini-card .value{font-size:22px;font-weight:800;margin-top:6px}.sidebar footer{position:absolute;left:18px;right:18px;bottom:18px;font-size:12px;color:var(--muted)}.main{padding:18px}.topbar{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap}.topbar-left{display:flex;gap:10px;align-items:flex-start}.title h2{margin:0;font-size:24px}.title p{margin:4px 0 0;color:var(--muted)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn,.input,.select{border:1px solid var(--line);background:rgba(17,27,47,.68);color:var(--text);border-radius:14px;padding:11px 12px;box-shadow:none}.btn{cursor:pointer}.btn.primary{background:linear-gradient(180deg,rgba(251,191,36,.18),rgba(245,158,11,.16));border-color:rgba(251,191,36,.45)}.btn.ghost{background:rgba(11,18,32,.42)}.btn.danger{border-color:rgba(239,68,68,.38);background:rgba(239,68,68,.12)}.btn.subtle{background:transparent;border-color:rgba(255,255,255,.08)}.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(17,27,47,.88),rgba(12,19,35,.9));border-radius:18px;box-shadow:var(--shadow-soft)}.panel-head{padding:14px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.panel-head h3{margin:0;font-size:15px}.panel-head p{margin:2px 0 0;color:var(--muted);font-size:12px}.panel-body{padding:16px}.hero-panel{background:linear-gradient(135deg,rgba(251,191,36,.13),rgba(56,189,248,.07) 45%,rgba(11,18,32,.96));border-color:rgba(251,191,36,.28);box-shadow:var(--shadow)}.hero-grid{display:grid;grid-template-columns:minmax(280px,1.2fr) minmax(240px,.8fr);gap:14px;align-items:stretch}.hero-copy h3{font-size:28px;margin:0 0 8px}.hero-copy p{margin:0;color:var(--muted);max-width:58ch}.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.hero-summary{display:grid;gap:10px}.summary-card{padding:14px;border:1px solid rgba(255,255,255,.08);background:rgba(7,13,24,.38);border-radius:16px}.summary-card strong{display:block;font-size:22px}.summary-card span{display:block;color:var(--muted);font-size:12px;margin-top:5px}.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.metric{padding:16px;border-radius:18px;border:1px solid rgba(255,255,255,.06);background:rgba(9,15,29,.28)}.metric .label{font-size:12px;color:var(--muted)}.metric .value{font-size:28px;font-weight:900;margin-top:8px}.metric .sub{font-size:12px;color:var(--muted);margin-top:4px}.page{display:none}.page.active{display:block}.split{display:grid;grid-template-columns:minmax(380px,1.15fr) minmax(320px,.85fr);gap:16px;align-items:start}.stack{display:grid;gap:16px}.filter-row{display:flex;flex-wrap:wrap;gap:10px}.action-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.action-card{padding:14px;border-radius:16px;border:1px solid var(--line);background:rgba(11,18,32,.44)}.action-card .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.action-card .big{font-size:28px;font-weight:900;margin-top:8px}.action-card .small{margin-top:6px}table{width:100%;border-collapse:collapse}th,td{padding:11px 10px;border-bottom:1px solid var(--line-soft);text-align:left;font-size:13px;vertical-align:top}th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}tbody tr{cursor:pointer}tbody tr:hover{background:rgba(255,255,255,.02)}tbody tr.active{background:rgba(251,191,36,.08)}.tag{display:inline-flex;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:rgba(11,18,32,.55);font-size:11px;color:var(--muted)}.status.good{color:var(--good)}.status.warn{color:var(--warn)}.status.bad{color:var(--bad)}.empty{padding:28px;border:1px dashed var(--line);border-radius:16px;color:var(--muted);text-align:center}.detail-header{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.detail-header h3{margin:0;font-size:19px}.detail-header p{margin:6px 0 0;color:var(--muted);font-size:13px}.detail-actions{display:flex;gap:8px;flex-wrap:wrap}.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}.info-cell{border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;background:rgba(11,18,32,.34)}.info-cell .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.info-cell .v{font-size:18px;font-weight:800;margin-top:6px}.cost-tree{display:grid;gap:10px;margin-top:16px}.cost-node{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(11,18,32,.46)}.cost-node .top{display:flex;justify-content:space-between;gap:10px}.cost-node .name{font-weight:700}.cost-node .meta{color:var(--muted);font-size:12px;margin-top:4px}.cost-node .children{display:grid;gap:8px;margin-top:10px;padding-left:10px;border-left:1px dashed var(--line)}.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.tabs{display:flex;flex-wrap:wrap;gap:8px}.tabs button{border:1px solid var(--line);background:rgba(11,18,32,.55);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer}.tabs button.active{border-color:rgba(251,191,36,.55);background:rgba(251,191,36,.12)}.kpi-list{display:grid;gap:10px}.kpi-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border:1px solid rgba(255,255,255,.06);border-radius:14px;background:rgba(11,18,32,.38)}.kpi-row.clickable{cursor:pointer}.cat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.cat-card{padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.06);background:rgba(11,18,32,.36)}.cat-card h4{margin:0 0 8px;font-size:15px}.cat-card p{margin:0;color:var(--muted);font-size:13px}.muted{color:var(--muted)}.small{font-size:12px}.pill-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.saved-status{padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--muted);background:rgba(255,255,255,.02)}.mobile-only{display:none}.modal-wrap,.dialog-wrap{position:fixed;inset:0;background:rgba(3,8,20,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal-wrap.show,.dialog-wrap.show{display:flex}.modal,.dialog{width:min(980px,96vw);max-height:92vh;overflow:auto;border:1px solid var(--line);background:linear-gradient(180deg,rgba(17,27,47,.98),rgba(10,16,30,.98));border-radius:22px;box-shadow:var(--shadow)}.dialog{width:min(480px,96vw)}.modal-head,.dialog-head{padding:16px 18px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;position:sticky;top:0;background:rgba(17,27,47,.98);backdrop-filter:blur(10px);z-index:2}.dialog-head{position:static}.dialog-body{padding:18px}.dialog-actions,.modal-actions{display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;padding:16px 18px;border-top:1px solid var(--line-soft);background:rgba(17,27,47,.98)}.modal-body{padding:18px;display:grid;gap:14px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:12px;background:rgba(11,18,32,.55);color:var(--text);padding:11px 12px}.field textarea{min-height:90px;resize:vertical}.component-list{display:grid;gap:10px}.component-row{display:grid;grid-template-columns:140px 1fr 130px auto;gap:10px;align-items:end;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(11,18,32,.4)}.note{font-size:12px;color:var(--muted);line-height:1.45}.toast-stack{position:fixed;right:18px;bottom:18px;display:grid;gap:10px;z-index:80}.toast{min-width:260px;max-width:360px;padding:12px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(11,18,32,.94);box-shadow:var(--shadow-soft)}.toast strong{display:block}.toast p{margin:4px 0 0;color:var(--muted);font-size:13px}.toast.success{border-color:rgba(34,197,94,.38)}.toast.error{border-color:rgba(239,68,68,.38)}.toast.info{border-color:rgba(56,189,248,.35)}
    @media (max-width:1080px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;bottom:0;top:0;width:min(320px,88vw);height:auto;transform:translateX(-105%);transition:transform .22s ease}.sidebar.show{transform:translateX(0)}.sidebar footer{position:static;margin-top:18px}.sidebar-backdrop.show{display:block}.main{padding:16px}.split,.grid-2,.hero-grid{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}.mobile-only{display:inline-flex}}
    @media (max-width:720px){.topbar{align-items:stretch}.topbar-left{width:100%}.toolbar{width:100%}.toolbar .btn,.toolbar .saved-status{flex:1 1 calc(50% - 10px);justify-content:center;text-align:center}.grid-4,.cat-grid,.form-grid,.info-grid,.component-row,.action-strip{grid-template-columns:1fr}.detail-header{flex-direction:column}.hero-copy h3{font-size:24px}.toast-stack{left:12px;right:12px;bottom:12px}.toast{max-width:none;min-width:0}}
  </style>
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="logo">CMV</div><div><h1>PWA de Custos do Cardápio</h1><p>BOM, fichas técnicas, combos por camadas e rateio fixo</p></div></div>
      <nav class="nav" id="nav"></nav>
      <div class="side-stats" id="sideStats"></div>
      <footer>Base local em <strong>LocalStorage</strong>.<br>Exporte seu JSON sempre que fechar uma etapa.</footer>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="btn subtle mobile-only" id="navToggle" aria-label="Abrir navegação">Menu</button>
          <div class="title"><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Visão geral do custo do seu cardápio.</p></div>
        </div>
        <div class="toolbar">
          <select class="select" id="operationView"></select>
          <div class="saved-status" id="savedStatus">Base pronta</div>
          <button class="btn ghost" id="btnInstall" style="display:none;">Instalar PWA</button>
          <button class="btn ghost" id="btnExport">Exportar JSON</button>
          <label class="btn ghost" for="importFile">Importar JSON</label>
          <input id="importFile" type="file" accept="application/json" hidden>
          <button class="btn danger" id="btnReset">Restaurar base</button>
        </div>
      </div>
      <section class="page active" id="page-dashboard"></section>
      <section class="page" id="page-catalog"></section>
      <section class="page" id="page-resources"></section>
    </main>
  </div>
  <div class="modal-wrap" id="modalWrap">
    <div class="modal">
      <div class="modal-head"><div><h3 id="modalTitle" style="margin:0"></h3><div class="muted small" id="modalSubtitle"></div></div><button class="btn ghost" id="modalClose">Fechar</button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions"><button class="btn ghost" id="modalCancel">Cancelar</button><button class="btn primary" id="modalSave">Salvar</button></div>
    </div>
  </div>
  <div class="dialog-wrap" id="confirmWrap" aria-hidden="true">
    <div class="dialog">
      <div class="dialog-head"><div><h3 id="confirmTitle" style="margin:0">Confirmar ação</h3><div class="muted small" id="confirmSubtitle"></div></div></div>
      <div class="dialog-body" id="confirmMessage"></div>
      <div class="dialog-actions"><button class="btn ghost" id="confirmCancel">Cancelar</button><button class="btn danger" id="confirmAccept">Confirmar</button></div>
    </div>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
  <script src="app.js"></script>
</body>
</html>
